      
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>힐링캠프 로그인</title>
    <style>
        /* "힐링캠프" 테마를 위한 한글 지원 폰트 (Google Fonts 예시) */
        @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Pen+Script&display=swap');

        /* 전체 페이지 및 페이드 효과 */
        body {
            margin: 0;
            font-family: 'Gowun Dodum', sans-serif;
            display: flex;
            flex-direction: column;
            /* justify-content: space-between; /* 이전: 상하 공간 분배 */
            justify-content: flex-start; /* 변경: 상단부터 배치 시작 */
            align-items: center;
            height: 100vh;
            background-color: #F5EFE6;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.5s ease-in-out forwards;
            user-select: none; /* 전체 텍스트 드래그 방지 */
            -webkit-app-region: drag; /* 창 전체를 드래그 가능 영역으로 설정 */
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        body.fade-out {
            opacity: 1;
            animation: fadeOut 0.5s ease-in-out forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
            }
        }

        /* 로그인 컨텐츠 영역 (상단) */
        .login-container {
            margin-top: 10vh;
            text-align: center;
            padding: 30px 20px;
            background-color: rgba(255, 248, 230, 0.7);
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(119, 85, 50, 0.15);
            width: 90%;
            max-width: 420px;
            -webkit-app-region: no-drag;

            position: relative; /* 다른 효과를 위해 유지 가능 */
            /* 초기 테두리 설정 (두께는 있지만 색은 투명) */
            border: 3px solid transparent; /* 테두리 두께는 원하는 대로 설정 */
            /* 테두리 색상과 그림자 변경에 대한 부드러운 전환 효과 */
            transition: border-color 0.3s ease-out, box-shadow 0.3s ease-out;
        }

        .login-container:hover {
            /* 호버 시 테두리 색상 변경 */
            border-color: var(--shadow-outer-color, #775532); /* 버튼의 그림자 색상 변수 활용 또는 원하는 색상 지정 */
            /* (선택 사항) 호버 시 그림자도 약간 변경하여 입체감 추가 */
            box-shadow: 0 8px 20px rgba(119, 85, 50, 0.22);
        }

        .login-container h1 {
            font-family: 'Nanum Pen Script', cursive;
            color: #775532;
            font-size: 42px;
            margin-bottom: 15px;
            font-weight: 400;
            line-height: 1.2;
        }

        .login-container p {
            color: #8C6E54;
            font-size: 17px;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        /* 버튼 컨테이너 (하단 중앙) */
        .button-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 60px;
            margin-top: auto; /* 추가: 로그인 컨테이너와 버튼 컨테이너 사이 공간을 최대한 확보 */
            -webkit-app-region: no-drag; /* 버튼 영역은 드래그 안되도록 */
        }

        /* --- "힐링캠프" 테마 Squishy Button 스타일 --- */
         .squishy {
            /* CSS 변수 재정의 */
            --squish-magnitude-y: 4px;
            --button-base-y-offset: 2px;

            --button-bg-color: #B08D57;
            --button-text-color: #FFFFFF;
            --shadow-main-color: #8A6B40;
            --hover-bg-color: #C19A6B;
            --active-bg-color: #A07D4F;

            /* 그림자 디테일 변수 */
            --shadow-initial-blur: 0px;    /* 평상시 주 그림자 블러: 선명하게 */
            --shadow-initial-spread: 0px;  /* 평상시 주 그림자 확산 */
            --shadow-initial-ambient-blur: 8px; /* 평상시 주변 그림자 블러 */
            --shadow-initial-ambient-opacity: 0.25; /* 평상시 주변 그림자 투명도 */

            --shadow-hover-blur: 0px;      /* 호버 시 주 그림자 블러: 선명하게 */
            --shadow-hover-spread: 0px;    /* 호버 시 주 그림자 확산 */
            --shadow-hover-ambient-blur: 12px;  /* 호버 시 주변 그림자 블러 (약간 더 부드럽게) */
            --shadow-hover-ambient-opacity: 0.3; /* 호버 시 주변 그림자 투명도 (약간 더 진하게) */


            position: relative;
            padding: 18px 38px;
            font-size: 18px;
            font-family: 'IMHyemin', sans-serif;
            font-weight: normal;
            color: var(--button-text-color);
            background-color: var(--button-bg-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);

            box-shadow:
                /* 주 그림자 (버튼 아래쪽) - 선명하게 */
                0 calc(var(--squish-magnitude-y) + var(--button-base-y-offset)) var(--shadow-initial-blur) var(--shadow-initial-spread) var(--shadow-main-color),
                /* 주변 부드러운 그림자 (버튼이 떠 보이도록) */
                0 4px var(--shadow-initial-ambient-blur) rgba(138, 107, 64, var(--shadow-initial-ambient-opacity));

            transform: translateY(calc(-1 * var(--button-base-y-offset)));
            transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        box-shadow 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        background-color 0.2s ease-out;
            -webkit-app-region: no-drag;
            width: 90%;
            max-width: 300px;
        }

        .squishy:hover {
            background-color: var(--hover-bg-color);
            transform: translateY(calc(-1 * var(--button-base-y-offset) - 2px)); /* 호버 시 살짝 더 위로 */
            box-shadow:
                /* 주 그림자 (호버 시) - 선명하게 */
                0 calc(var(--squish-magnitude-y) + var(--button-base-y-offset) + 2px) var(--shadow-hover-blur) var(--shadow-hover-spread) var(--shadow-main-color), /* Y 오프셋은 약간 늘려 올라온 느낌 */
                /* 주변 부드러운 그림자 (호버 시) - 약간 더 넓고 부드럽게, 하지만 너무 번지지 않게 */
                0 6px var(--shadow-hover-ambient-blur) rgba(138, 107, 64, var(--shadow-hover-ambient-opacity));
        }

        .squishy:active {
            transform: translateY(var(--squish-magnitude-y) - var(--button-base-y-offset) + 1px);
            box-shadow:
                /* 눌렸을 때 그림자 - 매우 선명하고 얇게 */
                0 1px 0px 0px var(--shadow-main-color), /* 주 그림자: 블러 0, 스프레드 0 */
                0 1px 3px rgba(138, 107, 64, 0.15); /* 주변 그림자도 최소화 */
            background-color: var(--active-bg-color);
        }

    </style>
</head>
<body>
    <div class="login-container">
        <h1>힐링캠프에 오신 것을 환영합니다!</h1>
        <p>잠시 멈춰, 마음의 평화를 찾는 시간.<br>로그인하고 여정을 시작하세요.</p>
    </div>

    <div class="button-container">
        <button class="squishy squishy-classic" id="loginButton">
            마이크로소프트 로그인
        </button>
    </div>
    <script src="./js/login.js"></script>
</body>
</html>
