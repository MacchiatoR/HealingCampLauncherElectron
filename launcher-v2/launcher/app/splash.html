<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>HealingCamp</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #16181b;
      color: #f5f7fb;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      user-select: none;
    }

    .stack {
      width: 360px;
      display: grid;
      justify-items: center;
      gap: 22px;
    }

    .logo {
      width: 118px;
      height: 118px;
      object-fit: contain;
    }

    .title {
      margin: 0;
      font-size: 25px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .bar {
      width: 300px;
      height: 8px;
      overflow: hidden;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.12);
    }

    .fill {
      height: 100%;
      width: 42%;
      border-radius: inherit;
      background: #77d2b4;
      animation: sweep 1.1s ease-in-out infinite;
    }

    @keyframes sweep {
      0% { transform: translateX(-115%); }
      100% { transform: translateX(260%); }
    }
  </style>
</head>
<body>
  <main class="stack">
    <img class="logo" src="../../../assets/logo.png" alt="">
    <h1 class="title">HealingCamp Launcher</h1>
    <div class="bar" aria-hidden="true">
      <div class="fill"></div>
    </div>
  </main>
</body>
</html>
