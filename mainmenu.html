<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Main Menu</title>
    
    <style>
        /* 1. (추가) html 요소의 배경을 투명하게 만들어 윈도우의 투명함이 드러나게 합니다. */
        html {
            background: transparent;
        }

        /* 2. body, html 기본 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
        }

        /* 3. body 배경 이미지 설정 */
        body {
            background-image: url('assets/main_background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <!-- 콘텐츠 -->
</body>
</html>
