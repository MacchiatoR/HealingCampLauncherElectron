appId: 'healingcamplauncher'
productName: 'HealingCamp Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2018-2024 Daniel Scalzi'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,.eslintrc.json}'

extraResources:
  - 'libraries'

# Windows Configuration
win: 
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux: 
  target: 'AppImage'
  maintainer: 'Daniel Scalzi'
  vendor: 'Daniel Scalzi'
  synopsis: 'Modded Minecraft Launcher'
  description: 'Custom launcher which allows users to join modded servers. All mods, configurations, and updates are handled automatically.'
  category: 'Game'


directories:
  buildResources: 'build'
  output: 'dist'

# --- GitHub Releases 게시 설정 추가 ---
publish:
  provider: github
  owner: MacchiatoR # GitHub 사용자명 또는 조직명
  repo: HealingCampLauncherElectron # GitHub 저장소명
  private: true # 만약 private 저장소라면 true로 설정
  token: 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
  releaseType: release